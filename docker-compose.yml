version: '3.9'

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  gateway:
    build: ./services/gateway
    container_name: gateway
    ports:
      - "8000:8000"
    depends_on:
      - auth
      - profile
      - catalog
      - order
    networks:
      - frontend
      - backend
    restart: on-failure

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
    networks:
      - frontend
    restart: on-failure

  auth:
    build: ./services/auth
    container_name: auth
    environment:
      - HTTP_ADDR=:8001
      - JWT_SECRET=your-very-secret-jwt-key-change-in-production
    networks:
      - backend
    restart: on-failure

  profile:
    build: ./services/profile
    container_name: profile
    environment:
      - PORT=8003
      - DATABASE_URL=postgres://litsee:litsee@profile-db:5432/litsee_profile?sslmode=disable
      - JWT_SECRET=your-very-secret-jwt-key-change-in-production
    depends_on:
      - profile-db
      - redis
    networks:
      - backend
    restart: on-failure

  catalog:
    build: ./services/catalog
    container_name: catalog
    volumes:
      - ./services/catalog/files:/app/files
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=pass
      - DB_NAME=books
    depends_on:
      - db
      - redis
    networks:
      - backend
    restart: on-failure

  order:
    build: ./services/order
    container_name: order
    environment:
      - PORT=8002
      - DATABASE_URL=postgres://order_user:order_pass@order-db:5432/order_db?sslmode=disable
      - JWT_SECRET=your-very-secret-jwt-key-change-in-production
    depends_on:
      - order-db
    networks:
      - backend
    restart: on-failure

  profile-db:
    image: postgres:16-alpine
    container_name: profile-db
    environment:
      - POSTGRES_USER=litsee
      - POSTGRES_PASSWORD=litsee
      - POSTGRES_DB=litsee_profile
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/profile/migrations:/docker-entrypoint-initdb.d/:ro
    networks:
      - backend
    restart: on-failure

  order-db:
    image: postgres:16-alpine
    container_name: order-db
    environment:
      - POSTGRES_USER=order_user
      - POSTGRES_PASSWORD=order_pass
      - POSTGRES_DB=order_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    restart: on-failure

  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: books
    networks:
      - backend
    restart: on-failure

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: on-failure